name: Build Windows exe

# PyInstaller cannot cross-compile, so the Windows build runs on a Windows
# runner. Manual runs produce a downloadable artifact; tag pushes (v*) also
# attach the zip to the GitHub release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller --noconfirm --clean LeadLine-win.spec

      - name: Read version
        id: v
        shell: bash
        run: echo "version=$(python -c 'import leadline; print(leadline.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path dist/LeadLine.exe -DestinationPath "dist/LeadLine-${{ steps.v.outputs.version }}-windows.zip"

      - name: Smoke test (exe starts and creates its data dir)
        shell: pwsh
        run: |
          $env:LEADLINE_DATA_DIR = "$env:RUNNER_TEMP\leadline-smoke"
          $p = Start-Process -FilePath dist/LeadLine.exe -PassThru
          Start-Sleep -Seconds 20
          if ($p.HasExited) { throw "LeadLine.exe exited early (code $($p.ExitCode))" }
          if (-not (Test-Path "$env:LEADLINE_DATA_DIR\leadline.db")) { throw "no database created" }
          Stop-Process -Id $p.Id -Force

      - uses: actions/upload-artifact@v4
        with:
          name: LeadLine-windows
          path: dist/LeadLine-*-windows.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" dist/LeadLine-*-windows.zip --clobber \
            || gh release create "$GITHUB_REF_NAME" dist/LeadLine-*-windows.zip --generate-notes
